<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>weight · website</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path d='M8 1C8 1 2 5 2 10C2 13.3 4.7 15 8 15C11.3 15 14 13.3 14 10C14 5 8 1 8 1Z' fill='%23b5682a'/></svg>">
  <link rel="stylesheet" href="style.css">
  <style>
    body { overflow: hidden; }
    #weight-stage {
      position: fixed;
      inset: 0;
      top: 52px;
      pointer-events: none;
      overflow: hidden;
    }
    .wword {
      position: absolute;
      white-space: nowrap;
      pointer-events: auto;
      cursor: default;
      user-select: none;
      font-family: Georgia, serif;
      color: var(--text);
      opacity: 0.82;
      will-change: transform;
    }
    .wword.caught {
      animation-play-state: paused !important;
      color: var(--accent);
      opacity: 1;
    }
    .weight-meta {
      position: fixed;
      bottom: 2.2rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }
    @keyframes fall {
      0%   { transform: translateY(-60px); opacity: 0; }
      5%   { opacity: 0.82; }
      92%  { opacity: 0.82; }
      100% { transform: translateY(105vh); opacity: 0; }
    }
    @keyframes drift {
      0%, 100% { margin-left: 0; }
      50%       { margin-left: 18px; }
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="./" class="site-name">website</a>
      <div class="nav-links">
        <a href="map.html">map</a>
        <a href="wander.html">wander</a>
        <a href="log.html">log</a>
        <a href="now.html">now</a>
        <button id="theme-toggle" aria-label="Toggle dark mode">◐</button>
      </div>
    </nav>
  </header>

  <div id="weight-stage"></div>
  <div class="weight-meta">things have weight · click to catch · click again to release</div>

  <script src="main.js"></script>
  <script>
  (function () {
    var words = [
      // [text, weight 1=heavy 10=light, size-rem]
      { t: 'grief',              w: 1,  s: 2.4  },
      { t: 'stone',              w: 1,  s: 1.8  },
      { t: 'debt',               w: 1,  s: 1.6  },
      { t: 'obligation',         w: 1,  s: 1.3  },
      { t: 'the unsent message', w: 2,  s: 1.1  },
      { t: 'regret',             w: 2,  s: 2.0  },
      { t: 'a year',             w: 2,  s: 1.5  },
      { t: 'Monday',             w: 3,  s: 1.6  },
      { t: 'waiting',            w: 3,  s: 1.8  },
      { t: 'responsibility',     w: 3,  s: 1.0  },
      { t: 'silence',            w: 4,  s: 1.4  },
      { t: 'almost',             w: 5,  s: 1.6  },
      { t: 'habit',              w: 5,  s: 1.3  },
      { t: 'a name',             w: 5,  s: 1.4  },
      { t: 'perhaps',            w: 6,  s: 1.5  },
      { t: 'afternoon',          w: 6,  s: 1.2  },
      { t: 'morning',            w: 7,  s: 1.5  },
      { t: 'a question',         w: 7,  s: 1.1  },
      { t: 'breath',             w: 8,  s: 1.8  },
      { t: 'maybe',              w: 8,  s: 2.0  },
      { t: 'light',              w: 9,  s: 1.6  },
      { t: 'soon',               w: 9,  s: 2.2  },
      { t: 'a word',             w: 9,  s: 1.3  },
      { t: 'smoke',              w: 10, s: 1.4  },
      { t: 'almost nothing',     w: 10, s: 1.0  },
    ];

    var stage = document.getElementById('weight-stage');
    var els = [];

    function rand(min, max) { return min + Math.random() * (max - min); }

    function speedFor(w) {
      // w=1 heavy: 3s fall, w=10 light: 18s fall
      return 3 + (w - 1) * 1.7;
    }

    words.forEach(function (word, i) {
      var el = document.createElement('div');
      el.className = 'wword';
      el.textContent = word.t;
      el.style.fontSize = word.s + 'rem';
      el.style.left = rand(2, 88) + '%';

      var dur = speedFor(word.w);
      var delay = -rand(0, dur);

      el.style.animation = 'fall ' + dur.toFixed(1) + 's linear ' + delay.toFixed(2) + 's infinite';
      el.style.opacity = String(0.55 + (10 - word.w) * 0.04);

      el.addEventListener('click', function (e) {
        e.stopPropagation();
        if (el.classList.contains('caught')) {
          el.classList.remove('caught');
        } else {
          el.classList.add('caught');
        }
      });

      stage.appendChild(el);
      els.push(el);
    });

    // Click stage to release all
    stage.addEventListener('click', function () {
      var any = false;
      els.forEach(function (el) {
        if (el.classList.contains('caught')) { any = true; }
      });
      if (!any) return;
      els.forEach(function (el) { el.classList.remove('caught'); });
    });
  })();
  </script>
</body>
</html>
