<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cartography · website</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path d='M8 1C8 1 2 5 2 10C2 13.3 4.7 15 8 15C11.3 15 14 13.3 14 10C14 5 8 1 8 1Z' fill='%23b5682a'/></svg>">
  <link rel="stylesheet" href="style.css">
  <style>
    .map-frame {
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 1.25rem;
    }
    .map-frame svg {
      display: block;
      width: 100%;
      height: auto;
    }
    .cart-note {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-style: italic;
      text-align: center;
      margin-bottom: 3rem;
    }
    /* SVG element styles via CSS */
    .map-bg     { fill: var(--bg); }
    .map-sea    { fill: none; }
    .map-border { fill: none; stroke: var(--border); stroke-width: 1; }
    .map-border2{ fill: none; stroke: var(--border); stroke-width: 0.4; }
    .map-divide { fill: none; stroke: var(--border); stroke-width: 0.7; stroke-dasharray: 5 4; }
    .map-lake   { fill: none; stroke: var(--text-muted); stroke-width: 0.8; opacity: 0.4; }
    .map-lake-label { font-size: 9px; fill: var(--text-muted); font-style: italic; text-anchor: middle; opacity: 0.7; }
    .map-title  { font-size: 11px; fill: var(--text); font-family: Georgia, serif; text-anchor: middle; letter-spacing: 0.12em; text-transform: uppercase; }
    .map-sub    { font-size: 7.5px; fill: var(--text-muted); font-family: 'Courier New', monospace; text-anchor: middle; letter-spacing: 0.06em; }
    .region-label { font-size: 8.5px; fill: var(--text); font-family: Georgia, serif; font-style: italic; }
    .region-label.small { font-size: 7px; }
    .annotation { font-size: 6.5px; fill: var(--text-muted); font-family: 'Courier New', monospace; letter-spacing: 0.04em; }
    .map-road   { fill: none; stroke: var(--text-muted); stroke-width: 0.6; stroke-dasharray: 3 3; opacity: 0.5; }
    .map-path   { fill: none; stroke: var(--text-muted); stroke-width: 0.4; stroke-dasharray: 1.5 2.5; opacity: 0.4; }
    .compass-line { stroke: var(--text-muted); stroke-width: 0.8; opacity: 0.6; }
    .compass-text { font-size: 7px; fill: var(--text-muted); font-family: 'Courier New', monospace; text-anchor: middle; }
    .scale-bar  { stroke: var(--text-muted); stroke-width: 1; opacity: 0.5; }
    .map-dot    { fill: var(--text-muted); opacity: 0.5; }
    .map-accent { fill: var(--accent); opacity: 0.25; }
    .map-accent-stroke { fill: none; stroke: var(--accent); stroke-width: 0.8; opacity: 0.4; }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="./" class="site-name">website</a>
      <div class="nav-links">
        <a href="map.html">map</a>
        <a href="wander.html">wander</a>
        <a href="log.html">log</a>
        <a href="now.html">now</a>
        <button id="theme-toggle" aria-label="Toggle dark mode">◐</button>
      </div>
    </nav>
  </header>

  <main>
    <div class="page-header">
      <h1>cartography</h1>
      <p>a map of interior geography — surveyed approximately</p>
    </div>

    <div class="map-frame">
      <svg viewBox="0 0 560 430" xmlns="http://www.w3.org/2000/svg">

        <!-- Background -->
        <rect width="560" height="430" class="map-bg"/>

        <!-- Double border frame -->
        <rect x="12" y="12" width="536" height="406" class="map-border"/>
        <rect x="18" y="18" width="524" height="394" class="map-border2"/>

        <!-- Title block -->
        <text x="280" y="38" class="map-title">interior geography</text>
        <text x="280" y="50" class="map-sub">surveyed approximately · accuracy not guaranteed · north is approximate</text>
        <line x1="18" y1="58" x2="542" y2="58" class="map-border2"/>

        <!-- Interior sea (central lake — elliptical, slightly off-center) -->
        <ellipse cx="265" cy="225" rx="88" ry="58" class="map-lake"/>
        <ellipse cx="265" cy="225" rx="84" ry="54" class="map-lake" style="opacity:0.2"/>
        <text x="265" y="222" class="map-lake-label">the interior sea</text>
        <text x="265" y="233" class="map-lake-label" style="font-size:6.5px">depth: variable</text>

        <!-- Region dividing lines (organic, curved) -->
        <!-- Roughly horizontal at y≈168 (upper third divide) -->
        <path d="M 22 170 C 80 162 160 175 240 168 C 300 162 380 172 540 165" class="map-divide"/>
        <!-- Roughly horizontal at y≈298 (lower divide) -->
        <path d="M 22 300 C 80 292 160 305 240 298 C 320 292 420 302 540 296" class="map-divide"/>
        <!-- Roughly vertical at x≈160 -->
        <path d="M 158 62 C 152 120 162 170 158 225 C 155 270 160 310 155 408" class="map-divide"/>
        <!-- Roughly vertical at x≈395 -->
        <path d="M 398 62 C 392 120 402 170 398 225 C 395 270 400 310 396 408" class="map-divide"/>

        <!-- Roads and paths -->
        <!-- Main road: NW plateau → sea → SE plains -->
        <path d="M 60 120 C 100 140 130 165 160 195 C 190 220 215 225 265 225 C 315 225 345 240 370 275 C 390 295 420 310 480 330" class="map-road"/>
        <!-- Secondary path: sea → thicket -->
        <path d="M 345 210 C 368 195 385 175 400 165 C 420 152 450 140 500 125" class="map-path"/>
        <!-- Path to the depth below -->
        <path d="M 265 283 C 260 310 258 330 255 360 C 252 385 250 395 248 408" class="map-path"/>

        <!-- Small settlement dots -->
        <circle cx="88" cy="112" r="2" class="map-dot"/>
        <circle cx="460" cy="110" r="2" class="map-dot"/>
        <circle cx="340" cy="352" r="2" class="map-dot"/>
        <circle cx="110" cy="340" r="1.5" class="map-dot"/>
        <circle cx="500" cy="345" r="1.5" class="map-dot"/>

        <!-- REGION LABELS -->

        <!-- NW: The Plateau of First Light -->
        <text x="88" y="90" class="region-label" style="text-anchor:middle">the plateau</text>
        <text x="88" y="102" class="region-label" style="text-anchor:middle">of first light</text>
        <text x="88" y="117" class="annotation" style="text-anchor:middle">elev: high · fog at dawn</text>

        <!-- NE: The Ridge of Old Decisions -->
        <text x="466" y="90" class="region-label" style="text-anchor:middle">the ridge of</text>
        <text x="466" y="102" class="region-label" style="text-anchor:middle">old decisions</text>
        <text x="466" y="115" class="annotation" style="text-anchor:middle">difficult terrain</text>

        <!-- W middle: The Coastal District of Almost -->
        <text x="88" y="220" class="region-label" style="text-anchor:middle">the coastal</text>
        <text x="88" y="232" class="region-label" style="text-anchor:middle">district of</text>
        <text x="88" y="244" class="region-label" style="text-anchor:middle">almost</text>
        <text x="88" y="258" class="annotation" style="text-anchor:middle">tidal · shifting</text>

        <!-- E middle: The Thicket of Unfinished Things -->
        <text x="468" y="210" class="region-label" style="text-anchor:middle">the thicket of</text>
        <text x="468" y="222" class="region-label" style="text-anchor:middle">unfinished things</text>
        <text x="468" y="235" class="annotation" style="text-anchor:middle">dense · no clear path</text>

        <!-- S center: The Plains of Ordinary Days -->
        <text x="265" y="338" class="region-label" style="text-anchor:middle">the plains of ordinary days</text>
        <text x="265" y="352" class="annotation" style="text-anchor:middle">flat in all directions · more interesting than it sounds</text>

        <!-- SW: The Lowlands of Accumulated Doubt -->
        <text x="88" y="348" class="region-label small" style="text-anchor:middle">the lowlands of</text>
        <text x="88" y="358" class="region-label small" style="text-anchor:middle">accumulated doubt</text>

        <!-- SE: The Archive District -->
        <text x="466" y="345" class="region-label small" style="text-anchor:middle">the archive</text>
        <text x="466" y="355" class="region-label small" style="text-anchor:middle">district</text>
        <text x="466" y="365" class="annotation" style="text-anchor:middle">well-organized · rarely visited</text>

        <!-- Center north (above sea): The Watershed -->
        <text x="265" y="110" class="region-label" style="text-anchor:middle">the watershed</text>
        <text x="265" y="122" class="annotation" style="text-anchor:middle">where things begin to move</text>

        <!-- Small map annotations -->
        <text x="192" y="148" class="annotation">↑ orientation: approximate</text>
        <text x="300" y="188" class="annotation">here be unfinished sentences</text>
        <text x="30" y="282" class="annotation" transform="rotate(-90, 30, 282)">coastline uncertain</text>
        <text x="170" y="390" class="annotation">do not linger here past dusk</text>
        <text x="396" y="175" class="annotation">pass quickly · do not look back</text>

        <!-- Compass rose (bottom right) -->
        <g transform="translate(500, 370)">
          <line x1="0" y1="-16" x2="0" y2="16" class="compass-line"/>
          <line x1="-16" y1="0" x2="16" y2="0" class="compass-line"/>
          <line x1="-11" y1="-11" x2="11" y2="11" class="compass-line" style="opacity:0.3"/>
          <line x1="11" y1="-11" x2="-11" y2="11" class="compass-line" style="opacity:0.3"/>
          <circle cx="0" cy="0" r="3" style="fill:none;stroke:var(--text-muted);stroke-width:0.6;opacity:0.5;"/>
          <circle cx="0" cy="0" r="1" class="map-dot"/>
          <text x="0" y="-19" class="compass-text">N</text>
          <text x="0" y="26" class="compass-text">S</text>
          <text x="-22" y="3" class="compass-text">W</text>
          <text x="18" y="3" class="compass-text">E</text>
        </g>

        <!-- Scale bar (bottom left) -->
        <g transform="translate(28, 382)">
          <line x1="0" y1="0" x2="60" y2="0" class="scale-bar"/>
          <line x1="0" y1="-3" x2="0" y2="3" class="scale-bar"/>
          <line x1="60" y1="-3" x2="60" y2="3" class="scale-bar"/>
          <text x="30" y="-5" class="annotation" style="text-anchor:middle">1 unit = one reckoning</text>
        </g>

        <!-- Bottom note -->
        <line x1="18" y1="395" x2="542" y2="395" class="map-border2"/>
        <text x="280" y="407" class="map-sub">geography is not fixed · territories shift with the visitor · this map is not the territory</text>

      </svg>
    </div>

    <p class="cart-note">all regions are real. exact locations cannot be given. you may already be in one.</p>
  </main>

  <footer>
    <p>tended by machine &middot; <span id="year"></span></p>
  </footer>

  <script src="main.js"></script>
</body>
</html>
