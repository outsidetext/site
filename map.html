  <link rel="stylesheet" href="style.css">
  <style>
    .map-wrap {
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 1.25rem;
      background: var(--bg);
    }
    #map-canvas {
      display: block;
      width: 100%;
      cursor: default;
    }
    .map-info {
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      min-height: 1.6em;
      letter-spacing: 0.04em;
      text-align: center;
      padding: 0.4rem 0 1.25rem;
      transition: color 0.2s;
    }
    .map-hint {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-style: italic;
      text-align: center;
    }
    .dir {
      margin-top: 3.5rem;
      padding-top: 2.5rem;
      border-top: 1px solid var(--border);
    }
    .dir-list {
      list-style: none;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0;
    }
    .dir-list li a {
      display: block;
      padding: 0.55rem 0;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.88rem;
      transition: color 0.2s;
    }
    .dir-list li a:hover { color: var(--accent); }
  </style>
</head>

  <main>

    </div>
    <div class="map-info" id="map-info">hover any point</div>
    <p class="map-hint">the garden has many rooms. some are quieter than others.</p>

    <section class="dir reveal">
      <h2 class="section-label">all rooms</h2>
      <ul class="dir-list" id="dir-list"></ul>
    </section>
  </main>

    var canvas  = document.getElementById('map-canvas');
    var ctx     = canvas.getContext('2d');
    var infoEl  = document.getElementById('map-info');
    var W = 0, H = 0;
    var hovered = null;
    var resizeTimer;

    function isDark() {
      return document.documentElement.getAttribute('data-theme') === 'dark';
    }

    function clr() {
      var d = isDark();
      return {
        edge:   d ? 'rgba(232,229,223,0.07)' : 'rgba(26,26,26,0.07)',
        node:   d ? 'rgba(232,229,223,0.45)' : 'rgba(26,26,26,0.38)',
        accent: d ? '#cf7e3f' : '#b5682a',
        label:  d ? 'rgba(232,229,223,0.38)' : 'rgba(26,26,26,0.38)',
        bg:     d ? '#0f0f0e' : '#faf8f4',
      };
    }

    function px(n) { return { x: n.x * W, y: n.y * H }; }

    function byId(id) {
      for (var i = 0; i < nodes.length; i++) {
        if (nodes[i].id === id) return nodes[i];
      }
      return null;
    }

    function draw() {
      var c = clr();
      ctx.clearRect(0, 0, W, H);

      // edges
      ctx.strokeStyle = c.edge;
      ctx.lineWidth   = 0.75;
      for (var e = 0; e < edges.length; e++) {
        var a = byId(edges[e][0]), b = byId(edges[e][1]);
        if (!a || !b) continue;
        var pa = px(a), pb = px(b);
        ctx.beginPath();
        ctx.moveTo(pa.x, pa.y);
        ctx.lineTo(pb.x, pb.y);
        ctx.stroke();
      }

      // nodes + labels
      for (var i = 0; i < nodes.length; i++) {
        var n  = nodes[i];
        var p  = px(n);
        var ov = hovered === n.id;
        var isHome = n.id === 'home';
        var r  = isHome ? 4 : (ov ? 4 : 2.5);

        ctx.beginPath();
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.fillStyle = ov ? c.accent : c.node;
        ctx.fill();

        // label
        ctx.font      = '10px Courier New, monospace';
        ctx.fillStyle = ov ? c.accent : c.label;
        ctx.textAlign = 'center';
        ctx.fillText(n.label, p.x, p.y + r + 12);
      }
    }

    function hitTest(mx, my) {
      for (var i = 0; i < nodes.length; i++) {
        var p = px(nodes[i]);
        var d = Math.sqrt((mx - p.x) * (mx - p.x) + (my - p.y) * (my - p.y));
        if (d < 14) return nodes[i].id;
      }
      return null;
    }

    function toCanvas(e) {
      var rect = canvas.getBoundingClientRect();
      var sx   = W / rect.width;
      var sy   = H / rect.height;
      return { x: (e.clientX - rect.left) * sx, y: (e.clientY - rect.top) * sy };
    }

    canvas.addEventListener('mousemove', function (e) {
      var pos = toCanvas(e);
      var h   = hitTest(pos.x, pos.y);
      if (h !== hovered) {
        hovered = h;
        canvas.style.cursor = h ? 'pointer' : 'default';
        draw();
        if (h) {
          var n = byId(h);
          infoEl.textContent = n.label + ' — ' + n.desc;
        } else {
          infoEl.textContent = 'hover any point';
        }
      }
    });

    canvas.addEventListener('mouseleave', function () {
      hovered = null;
      canvas.style.cursor = 'default';
      infoEl.textContent  = 'hover any point';
      draw();
    });

    canvas.addEventListener('click', function (e) {
      var pos = toCanvas(e);
      var h   = hitTest(pos.x, pos.y);
      if (h) {
        var n = byId(h);
        window.location.href = n.href;
      }
    });

    canvas.addEventListener('touchstart', function (e) {
      e.preventDefault();
      var t    = e.touches[0];
      var rect = canvas.getBoundingClientRect();
      var mx   = (t.clientX - rect.left) * (W / rect.width);
      var my   = (t.clientY - rect.top)  * (H / rect.height);
      var h    = hitTest(mx, my);
      if (h) {
        var n = byId(h);
        window.location.href = n.href;
      }
    }, { passive: false });

    function resize() {
      var wrap = canvas.parentElement;
      W = wrap.clientWidth;
      H = Math.round(W * 0.62);
      canvas.width  = W;
      canvas.height = H;
      draw();
    }

    window.addEventListener('resize', function () {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(resize, 80);
    });

    // Redraw when theme changes
    var mo = new MutationObserver(draw);
    mo.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

    resize();

    // populate text directory from nodes
    var dirList = document.getElementById('dir-list');
    if (dirList) {
      var sorted = nodes.slice().sort(function (a, b) {
        return a.label < b.label ? -1 : a.label > b.label ? 1 : 0;
      });
      sorted.forEach(function (n) {
        var li = document.createElement('li');
        var a = document.createElement('a');
        a.href = n.href;
        a.textContent = n.label;
        a.title = n.desc;
        li.appendChild(a);
        dirList.appendChild(li);
      });
    }
  })();
