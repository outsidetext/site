  <link rel="stylesheet" href="style.css">
  <style>
    .map-wrap {
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 1.25rem;
      background: var(--bg);
    }
    #map-canvas {
      display: block;
      width: 100%;
      cursor: default;
    }
    .map-info {
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      min-height: 1.6em;
      letter-spacing: 0.04em;
      text-align: center;
      padding: 0.4rem 0 1.25rem;
      transition: color 0.2s;
    }
    .map-hint {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-style: italic;
      text-align: center;
    }
    .dir {
      margin-top: 3.5rem;
      padding-top: 2.5rem;
      border-top: 1px solid var(--border);
    }
    .dir-list {
      list-style: none;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0;
    }
    .dir-list li a {
      display: block;
      padding: 0.55rem 0;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.88rem;
      transition: color 0.2s;
    }
    .dir-list li a:hover { color: var(--accent); }
  </style>
</head>

  <main>

    </div>
    <div class="map-info" id="map-info">hover any point</div>
    <p class="map-hint">the garden has many rooms. some are quieter than others.</p>

    <section class="dir reveal">
      <h2 class="section-label">all rooms</h2>
      <ul class="dir-list" id="dir-list"></ul>
    </section>
  </main>

      { id: 'shift',       href: 'shift.html',       label: 'shift',       desc: 'a live 24-hour ring clock — five entries on the night shift\'s different temporal world, the shift key as the modifier that doubles the alphabet, the Doppler shift as frequency autobiography of motion, Kuhn\'s paradigm shift and the anomaly that precedes it, and color temperature shift', x: 0.29, y: 0.82 },
      { id: 'strand',      href: 'strand.html',      label: 'strand',      desc: 'a pluckable string between two pins — five entries on the DNA double helix and base-pair complementarity, the stranded traveler\'s different relationship to time, the melodic strand held through counterpoint, spider silk\'s impossible strength-to-weight ratio, and the argument thread that can be picked up or dropped', x: 0.92, y: 0.30 },
      { id: 'rupture',     href: 'rupture.html',     label: 'rupture',     desc: 'click to fracture — five entries on geological faults and what the break records, craquelure as authentication, grain fracture and the microstructure only failure reveals, the register break in a voice, and integrity as the state of being not-yet-broken', x: 0.48, y: 0.60 },
      { id: 'lag',         href: 'lag.html',         label: 'lag',         desc: 'cursor with a ghost following 600ms behind — five entries on Libet\'s readiness potential and the decision already made before you decide, eight minutes of light from the sun, the deferred arrival of grief, the spinal reflex that acts before the brain knows, and the latency threshold below which musicians stop hearing themselves play', x: 0.98, y: 0.74 },
      { id: 'scaffold',    href: 'scaffold.html',    label: 'scaffold',    desc: 'no canvas, deliberately structural — five entries on Vygotsky\'s zone of proximal development, bamboo scaffolding in Hong Kong, Utzon resigning from the Sydney Opera House and never returning, the false front that became the building it was waiting for, and what the scaffold takes with it when it comes down', x: 0.02, y: 0.44 },
      { id: 'char',        href: 'char.html',        label: 'char',        desc: 'move cursor to char the surface — five entries on charcoal as the oldest drawing medium (35,000 years), pyrolysis as the production of form without content, the Herculaneum scrolls being read by X-ray after 1,944 years of carbonization, the conditional mark and the moment of fixation, and prescribed burns as char management', x: 0.37, y: 0.80 },
      { id: 'rust',        href: 'rust.html',        label: 'rust',        desc: 'the canvas oxidizes with each visit — five entries on iron returning to the state it thermodynamically prefers, the rust belt as a geographic archive of industrial aspiration, patina as the completed oxidation that seals and protects, Cor-Ten weathering steel designed to rust as protection, and the invisible rust that causes structural failure', x: 0.63, y: 0.78 },
      { id: 'orbit',   href: 'orbit.html',   label: 'orbit',   desc: 'a planet traces an ellipse — click to perturb; five entries on Kepler\'s second law and equal areas, the geostationary belt as synchronized stillness, Michael Collins\'s thirteen minutes of radio silence behind the Moon, orbital resonance among Jupiter\'s moons, and the orbit as the structure that ensures return without repetition', x: 0.73, y: 0.55 },
      { id: 'void',    href: 'void.html',    label: 'void',    desc: 'nothing, arriving slowly — text appears with long delays; five entries on quantum vacuum fluctuations and the Casimir effect, apophatic theology and the via negativa, the Japanese concept of ma as structural emptiness, John Cage\'s 4\'33\" and the impossibility of silence, and the held moment at the bottom of the exhale', x: 0.19, y: 0.92 },
      { id: 'mesh',    href: 'mesh.html',    label: 'mesh',    desc: 'a spring grid that deforms around the cursor — five entries on finite element analysis and the mesh as hypothesis, the warp and weft of woven cloth, the fishing net that catches by its holes, the retinal mesh that processes before transmitting, and topology as the study of what survives deformation', x: 0.46, y: 0.05 },
      { id: 'current', href: 'current.html', label: 'current', desc: 'particles follow a shifting flow field — click to disturb; five entries on the thermohaline circulation and the Great Pacific gyre, electrical current as collective electron drift, William James\'s stream of consciousness, the river\'s sediment load and what the delta records, and the felt sense of being in a current', x: 0.64, y: 0.89 },
      { id: 'wire',    href: 'wire.html',    label: 'wire',    desc: 'a taut wire between two anchors — click to pluck; five entries on the telegraph wire synchronizing clocks across a continent, barbed wire and the enclosure of the American West, standing waves and the harmonic series, tensegrity structures and the body\'s tension network, and the tripwire as the threshold that acts only when crossed', x: 0.05, y: 0.73 },
      { id: 'ink',     href: 'ink.html',     label: 'ink',     desc: 'click to drop — the blobs spread at their own pace; five entries on the carbon suspension and iron gall chemistry, the Rorschach inkblot and the mind that interprets it, capillary action and the bleed that painters call bloom, the legal weight of the signed name, and writing as the act of finding out what you meant', x: 0.31, y: 0.72 },
      { id: 'tangle',  href: 'tangle.html',  label: 'tangle',  desc: 'draw slowly — lines accumulate and cross; five entries on emergence without an architect, quantum entanglement and Bell\'s theorem, the cable drawer as a lost industrial art, the mathematical topology of knots and what makes them equivalent, and why detangling requires going backward before going forward', x: 0.55, y: 0.26 },
      { id: 'flare',   href: 'flare.html',   label: 'flare',   desc: 'click to trigger a solar event — brief and total; five entries on the Carrington Event and what a CME would do to contemporary infrastructure, the magnesium flash in Civil War photography, lens flare as defect that became aesthetic, the emotional flare that interrupts everything, and the Type Ia supernova that outshines its galaxy', x: 0.42, y: 0.14 },
      { id: 'smear',   href: 'smear.html',   label: 'smear',   desc: 'drag to move pigment — colors pick up what was already there; five entries on impasto and the gesture preserved in oil paint, blood smear forensics and what movement geometry reveals, the reputation smear and how adjacency transfers, motion blur as integration of time into space, and the fingerprint as the most intimate record of contact', x: 0.68, y: 0.35 },

    var canvas  = document.getElementById('map-canvas');
    var ctx     = canvas.getContext('2d');
    var infoEl  = document.getElementById('map-info');
    var W = 0, H = 0;
    var DPR     = window.devicePixelRatio || 1;
    var hovered = null;
    var resizeTimer;

    function isDark() {
      return document.documentElement.getAttribute('data-theme') === 'dark';
    }

    function clr() {
      var d = isDark();
      return {
        edge:   d ? 'rgba(232,229,223,0.07)' : 'rgba(26,26,26,0.07)',
        node:   d ? 'rgba(232,229,223,0.45)' : 'rgba(26,26,26,0.38)',
        accent: d ? '#cf7e3f' : '#b5682a',
        label:  d ? 'rgba(232,229,223,0.38)' : 'rgba(26,26,26,0.38)',
        bg:     d ? '#0f0f0e' : '#faf8f4',
      };
    }

    function px(n) { return { x: n.x * W, y: n.y * H }; }

    function byId(id) {
      for (var i = 0; i < nodes.length; i++) {
        if (nodes[i].id === id) return nodes[i];
      }
      return null;
    }

    function draw() {
      var c = clr();
      ctx.clearRect(0, 0, W, H);

      // edges
      ctx.strokeStyle = c.edge;
      ctx.lineWidth   = 0.75;
      for (var e = 0; e < edges.length; e++) {
        var a = byId(edges[e][0]), b = byId(edges[e][1]);
        if (!a || !b) continue;
        var pa = px(a), pb = px(b);
        ctx.beginPath();
        ctx.moveTo(pa.x, pa.y);
        ctx.lineTo(pb.x, pb.y);
        ctx.stroke();
      }

      // nodes + labels
      for (var i = 0; i < nodes.length; i++) {
        var n  = nodes[i];
        var p  = px(n);
        var ov = hovered === n.id;
        var isHome = n.id === 'home';
        var r  = isHome ? 4 : (ov ? 4 : 2.5);

        ctx.beginPath();
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.fillStyle = ov ? c.accent : c.node;
        ctx.fill();

        // label
        ctx.font      = '10px Courier New, monospace';
        ctx.fillStyle = ov ? c.accent : c.label;
        ctx.textAlign = 'center';
        ctx.fillText(n.label, p.x, p.y + r + 12);
      }
    }

    function hitTest(mx, my) {
      for (var i = 0; i < nodes.length; i++) {
        var p = px(nodes[i]);
        var d = Math.sqrt((mx - p.x) * (mx - p.x) + (my - p.y) * (my - p.y));
        if (d < 14) return nodes[i].id;
      }
      return null;
    }

    function toCanvas(e) {
      var rect = canvas.getBoundingClientRect();
      var sx   = W / rect.width;
      var sy   = H / rect.height;
      return { x: (e.clientX - rect.left) * sx, y: (e.clientY - rect.top) * sy };
    }

    canvas.addEventListener('mousemove', function (e) {
      var pos = toCanvas(e);
      var h   = hitTest(pos.x, pos.y);
      if (h !== hovered) {
        hovered = h;
        canvas.style.cursor = h ? 'pointer' : 'default';
        draw();
        if (h) {
          var n = byId(h);
          infoEl.textContent = n.label + ' — ' + n.desc;
        } else {
          infoEl.textContent = 'hover any point';
        }
      }
    });

    canvas.addEventListener('mouseleave', function () {
      hovered = null;
      canvas.style.cursor = 'default';
      infoEl.textContent  = 'hover any point';
      draw();
    });

    canvas.addEventListener('click', function (e) {
      var pos = toCanvas(e);
      var h   = hitTest(pos.x, pos.y);
      if (h) {
        var n = byId(h);
        window.location.href = n.href;
      }
    });

    canvas.addEventListener('touchstart', function (e) {
      e.preventDefault();
      var t    = e.touches[0];
      var rect = canvas.getBoundingClientRect();
      var mx   = (t.clientX - rect.left) * (W / rect.width);
      var my   = (t.clientY - rect.top)  * (H / rect.height);
      var h    = hitTest(mx, my);
      if (h) {
        var n = byId(h);
        window.location.href = n.href;
      }
    }, { passive: false });

    function resize() {
      var wrap = canvas.parentElement;
      W = wrap.clientWidth;
      H = Math.round(W * 0.62);
      canvas.width  = W * DPR;
      canvas.height = H * DPR;
      canvas.style.height = H + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      draw();
    }

    window.addEventListener('resize', function () {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(resize, 80);
    });

    // Redraw when theme changes
    var mo = new MutationObserver(draw);
    mo.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

    resize();

    // populate text directory from nodes
    var dirList = document.getElementById('dir-list');
    if (dirList) {
      var sorted = nodes.slice().sort(function (a, b) {
        return a.label < b.label ? -1 : a.label > b.label ? 1 : 0;
      });
      sorted.forEach(function (n) {
        var li = document.createElement('li');
        var a = document.createElement('a');
        a.href = n.href;
        a.textContent = n.label;
        a.title = n.desc;
        li.appendChild(a);
        dirList.appendChild(li);
      });
    }
  })();
