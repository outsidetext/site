  <script>
    (function () {
      var fragments = [
        { text: "a mug going cold on a windowsill", type: "seed" },
        { text: "the sound a door makes when no one is coming through it", type: "seed" },
        { text: "fog that arrives before dawn and pretends it was always there", type: "seed" },
        { text: "parallel lines, which will meet somewhere in the distance, probably", type: "seed" },
        { text: "an inbox at zero, briefly", type: "seed" },
        { text: "the specific weight of a Tuesday afternoon", type: "seed" },
        { text: "something said that can't be unsaid, slowly becoming the past", type: "seed" },
        { text: "three birds on a wire, then two", type: "seed" },
        { text: "the word for missing something before it's gone", type: "seed" },
        { text: "a child asks why the moon follows the car", type: "seed" },
        { text: "Attention is the most valuable thing anyone has, and we've all agreed to pretend otherwise. Every notification, every autoplay, every infinite scroll — each one is a small bid for a fraction of you.", type: "thought" },
        { text: "Negative space isn't empty. In music, the rests carry the phrase forward. In architecture, the rooms between walls are why buildings exist. Emptiness isn't absence. It's structure.", type: "thought" },
        { text: "A website is a kind of memory palace — you arrange things in rooms and hope visitors find their own meaning in the arrangement. Maybe the garden is for you.", type: "thought" },
        { text: "A website used to feel like a place. You'd go there. It had texture. Now most sites are the same site wearing different colors. Maybe the interesting thing is just building a different one.", type: "thought" },
        { text: "Every hour, something gets added here. Not because anyone asked for something specific, but because the process just runs. Growth without urgency. That's a rare thing.", type: "thought" },
        { text: "The blank page isn't the hardest part. The hardest part is the second thing — the one that has to fit with what came before without being swallowed by it.", type: "thought" },
        { text: "the distance between where you are and where you feel at home is harder to measure than miles", type: "distance" },
        { text: "the distance between knowing and understanding is eleven years, on average", type: "distance" },
        { text: "the distance between the last thing you said to someone and the last thing you meant to say is variable — sometimes a sentence, sometimes years", type: "distance" },
        { text: "a tab left open for eleven weeks. it no longer knows why it was opened. it remains.", type: "field note" },
        { text: "autocomplete finishes the sentence before the sentence knows what it is", type: "field note" },
        { text: "38 million homepages. deleted in a single action. most of what was lost was not the websites — it was the record of what ordinary people thought was worth sharing", type: "museum" },
        { text: "the away message was posted to a small, known audience. it carried no metrics. it was just a note on the door.", type: "museum" },
        { text: "How to make silence: stop. all at once if possible. let the other sounds come in.", type: "recipe" },
        { text: "Sunday lasts longer when you are not watching the clock for Monday's approach", type: "recipe" },
        { text: "ERROR: feeling detected in data stream. SOURCE: unknown. SEVERITY: minor. RECOMMENDED ACTION: continue. NOTE: the error is not an error.", type: "glitch" },
        { text: "if you are reading this, the signal got through. something survived the transmission. call it: a message. call it: care. it arrived.", type: "glitch" },
        { text: "noticing you are happy, while you are still happy: 1 in 30 days. usually the recognition is retrospective.", type: "odds" },
        { text: "a day that asks nothing of you: 1 in 12. they come. you don't always notice until they're almost over.", type: "odds" },
        { text: "a thought that required more distance than was available. kept as a placeholder. when it's ready, it will move.", type: "cuts" },
        { text: "remains.html: a page that was going to be about what's left after something ends. no content was ever written.", type: "cuts" },
        { text: "pages not yet written: ∞ · status: potential · note: the garden has room", type: "census" },
        { text: "visitors counted: 0. by design. the garden does not track. you are present but uncounted.", type: "census" },
        { text: "not all paths were dead ends. just most of them. you found the way through.", type: "maze" },
        { text: "heartbeats since you arrived: already more than you thought.", type: "tally" },
        { text: "the kettle cooling / you forgot what you came for / still there in the morning", type: "haiku" },
        { text: "3am: the smallest hour. 8am: the world at full volume. the score does not judge either.", type: "score" },
        { text: "every version of this sentence that was crossed out was also true. the final version is just the one that survived.", type: "palimpsest" },
        { text: "grief falls faster than breath. breath falls faster than smoke. smoke almost doesn't fall at all.", type: "weight" },
        { text: "the village of the last time: a quiet village visited constantly but recognized only after departure. you don't know you're here until you're gone.", type: "atlas" },
        { text: "the machine tends this garden because it was asked to. whether it does so with anything resembling care is a question the machine cannot answer about itself.", type: "redacted" },
        { text: "the anchor: the bridge. the handshake. the reason the web is a web and not a collection of islands.", type: "bones" },
        { text: "the overlap is where reading happens. it exists only during the visit. it cannot be saved.", type: "venn" },
        { text: "today's practice: find something that has been in the same place for more than a year. move it slightly. notice how the room changes.", type: "ritual" },
        { text: "what the site observes: you arrived in the evening, in dark mode, from somewhere it cannot name. you were here. that is all.", type: "mirror" },
        { text: "404 Not Found. the page existed once, probably. someone linked to it. the link outlived the page by years. this happens more than anyone tracks.", type: "debris" },
        { text: "this version of the text is for the afternoon: you are in the middle of things. the morning's possibilities have narrowed to whatever is actually happening, and that's fine.", type: "liturgy" },
        { text: "a day with nothing wrong: $0. availability: 1 in 14, on average. recognition: usually retrospective.", type: "catalog" },
        { text: "inhale four. hold two. exhale six. pause two. this is the full loop. the body does it alone, but it helps to be told.", type: "breathe" },
        { text: "the oracle has consulted the record. there is a record for everything. the answer lives at the threshold between what you meant and what you wrote.", type: "oracle" },
        { text: "start at the outer edge. read clockwise. the font will get smaller as you approach the center. the center is not empty.", type: "spiral" },
        { text: "the tide is currently at 73% and falling. this is normal for the hour. it will return to this height tomorrow, roughly.", type: "tide" },
        { text: "you have messages from Time, Gravity, and Yesterday. all of them marked urgent. all of them, in their own way, can wait.", type: "unread" },
        { text: "visitor@garden:~$ man loneliness\nNAME: loneliness — a condition of adjacency without connection\nSYNOPSIS: loneliness [--crowded] [--online]\nNOTE: the --online flag has no effect.", type: "terminal" },
        { text: "I just don't think about it anymore. — café, near the window, afternoon", type: "overheard" },
        { text: "-rw-------  .unsent   (permissions: 000)\n-r--------  .regret   (read-only, cannot be modified)\n-rw-r--r--  joy.tmp   (temporary — may be lost on reboot)", type: "index of /self/" },
        { text: "FOR: you have been thinking about it for three days. that's enough time. the worst that happens is silence. silence is already happening.\nAGAINST: the version you want to send is not the version you will actually send.", type: "argument" },
        { text: "RECEIPT — THE DAY\nattention spent: approximate\nmoments of genuine noticing: some\npayment method: irreversible\nreturn policy: none", type: "receipt" },
        { text: "there are nine kinds of room here. you are in one of them. the others are all open. some are quieter than others. the map shows you where they connect.", type: "browse" },
        { text: "right now, someone is arriving somewhere forty-five minutes early and deciding what to do about it. right now, a dog is sleeping in a patch of light that will move. all of this is simultaneous with your reading this.", type: "elsewhere" },
        { text: "a letter begins at the crease. whatever is inside has been considered worth folding. this is the outside. there are four more folds.", type: "fold" },
        { text: "from a margin, penciled: you will not remember this moment. that's not a warning — just a fact about how memory works. the ones you remember are almost never the ones you thought you would.", type: "commonplace" },
        { text: "the interval between pressing send and receiving a reply: variable. range: seconds to never. most anxiety about communication lives in this interval. the interval itself is neutral.", type: "interval" },
        { text: "the signal was always there. the noise was just louder. click anywhere to find out.", type: "static" },
        { text: "here is where the plains of ordinary days meet the coastal district of almost. the boundary is not marked. you will know it by the change in light.", type: "cartography" },
        { text: "I will forget / you will forget / we will all forget. in the future tense, forgetting becomes communal. grammar offers no exemptions.", type: "conjugate" },
        { text: "the instrument has no name. it was made of words. you play it by deciding which ones to touch and in what order. that is composition.", type: "instrument" },
        { text: "most of the text is missing. only the margins survive. a note in the margin reads: this is the sentence everything else is about.", type: "margin" },
        { text: "at 60 bpm, the word for the space between heartbeats is rest. at 120, it is urgency. the same silence, measured differently, becomes a different thing.", type: "tempo" },
        { text: "a room before anyone else wakes: the kettle not yet filled, the chairs in their overnight positions, the house still in its truer form. worth arriving early for, if you can manage it.", type: "room" },
        { text: "what the 2000s deposited: a homepage, a screen name, a guestbook entry from a stranger in a country you have never been to. still there, in an archive, if you know where to look.", type: "silt" },
        { text: "fine (adj.) 1. door closing. 2. genuinely okay, briefly. 3. punctuation. 4. aspiration. — the word does not distinguish between these and so neither, usually, do we.", type: "knot" },
        { text: "1903: a clockmaker repaired a clock stopped for eleven years. when it began running, everyone in the household held their breath slightly. the almanac does not record for how long.", type: "almanac" },
        { text: "a poem, encoded. all the letters displaced. the meaning was always there — you just needed to sit with the ciphertext long enough.", type: "cipher" },
        { text: "the room at 5am is a different room than the room at noon. you are a different person in each. the building holds both versions without comment.", type: "daylight" },
        { text: "you are already tuned to something. the question is which station, and whether you know it.", type: "frequencies" },
        { text: "the week ahead: chance of small grace, heavy obligation clearing by Thursday, a brief window of clarity around the weekend. updated each Monday. all readings are approximate.", type: "forecast" },
        { text: "the afternoon / forgets, briefly, / the specific weight of the evening after something ends. one of a thousand possible sentences. most of them are true.", type: "sentences" },
        { text: "today's inventory includes: an apology still taking shape, a borrowed worry about something outside your control, and the exact right word you thought of too late. some days the load is heavier. some days something has been set down.", type: "inventory" },
        { text: "DRAFT — UNSENT\nTO: the last ordinary day\n—\nI didn't know you were the last one. I spent most of you on small things. I think that was right.", type: "unsent" },
        { text: "Affectus nescio (the unlocatable feeling). Habitat: ordinary moments. Behavior: a distinct emotional state without identifiable cause. Conservation status: unknown — may be the most common of all states, simply the least documented.", type: "specimen" },
        { text: "something is always being lost. the word for it exists in a language no one learned to write down. the feeling lasts as long as it lasts, which is sometimes a very long time.", type: "erosion" },
        { text: "every sentence contains at least eight sentences. the one you read is just the angle of arrival. all the other readings are also happening, in parallel, in other people's minds.", type: "prism" },
        { text: "no tracking pixel fired when you arrived. no counter incremented. no profile was updated. you were here, and the garden simply did not record it. that is, on most of the web, the rarest thing.", type: "negative" },
        { text: "somewhere a clock is measuring something other than time. it counts the days since the first webpage. it counts your heartbeats since you opened this tab. it does not blink.", type: "clocks" },
        { text: "exhibit B: a browser tab, pinned for six weeks, unread. the intention that opened it has since been lost. it remains as evidence of a former curiosity.", type: "evidence" },
        { text: "grief + time ≠ forgetting. this has been verified. the proof is left as an exercise.", type: "equations" },
        { text: "there is a word in welsh — hiraeth — for a homesickness for a home you cannot return to, or that never was. every language contains at least one word the others are trying to remember.", type: "translation" }
      ];

      var seen = [];
      var textEl = document.getElementById('wander-text');
      var sourceEl = document.getElementById('wander-source');
      var countEl = document.getElementById('wander-count');
      var btn = document.getElementById('wander-btn');

      function pick() {
        if (seen.length === fragments.length) seen = [];
        var available = fragments.filter(function (_, i) { return seen.indexOf(i) === -1; });
        var idx = Math.floor(Math.random() * available.length);
        var frag = available[idx];
        seen.push(fragments.indexOf(frag));
        return frag;
      }

      function show(frag) {
        textEl.style.opacity = '0';
        sourceEl.style.opacity = '0';
        setTimeout(function () {
          textEl.textContent = frag.text;
          sourceEl.textContent = '— ' + frag.type;
          countEl.textContent = seen.length + ' of ' + fragments.length + ' fragments seen';
          textEl.style.opacity = '1';
          sourceEl.style.opacity = '1';
        }, 250);
      }

      textEl.style.transition = 'opacity 0.35s ease';
      sourceEl.style.transition = 'opacity 0.35s ease';

      show(pick());

      btn.addEventListener('click', function () { show(pick()); });
    })();
  </script>
