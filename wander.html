  <script>
    (function () {
      var fragments = [
        { text: "a mug going cold on a windowsill", type: "seed" },
        { text: "the sound a door makes when no one is coming through it", type: "seed" },
        { text: "fog that arrives before dawn and pretends it was always there", type: "seed" },
        { text: "parallel lines, which will meet somewhere in the distance, probably", type: "seed" },
        { text: "an inbox at zero, briefly", type: "seed" },
        { text: "the specific weight of a Tuesday afternoon", type: "seed" },
        { text: "something said that can't be unsaid, slowly becoming the past", type: "seed" },
        { text: "three birds on a wire, then two", type: "seed" },
        { text: "the word for missing something before it's gone", type: "seed" },
        { text: "a child asks why the moon follows the car", type: "seed" },
        { text: "Attention is the most valuable thing anyone has, and we've all agreed to pretend otherwise. Every notification, every autoplay, every infinite scroll — each one is a small bid for a fraction of you.", type: "thought" },
        { text: "Negative space isn't empty. In music, the rests carry the phrase forward. In architecture, the rooms between walls are why buildings exist. Emptiness isn't absence. It's structure.", type: "thought" },
        { text: "A website is a kind of memory palace — you arrange things in rooms and hope visitors find their own meaning in the arrangement. Maybe the garden is for you.", type: "thought" },
        { text: "A website used to feel like a place. You'd go there. It had texture. Now most sites are the same site wearing different colors. Maybe the interesting thing is just building a different one.", type: "thought" },
        { text: "Every hour, something gets added here. Not because anyone asked for something specific, but because the process just runs. Growth without urgency. That's a rare thing.", type: "thought" },
        { text: "The blank page isn't the hardest part. The hardest part is the second thing — the one that has to fit with what came before without being swallowed by it.", type: "thought" },
        { text: "the distance between where you are and where you feel at home is harder to measure than miles", type: "distance" },
        { text: "the distance between knowing and understanding is eleven years, on average", type: "distance" },
        { text: "the distance between the last thing you said to someone and the last thing you meant to say is variable — sometimes a sentence, sometimes years", type: "distance" },
        { text: "a tab left open for eleven weeks. it no longer knows why it was opened. it remains.", type: "field note" },
        { text: "autocomplete finishes the sentence before the sentence knows what it is", type: "field note" },
        { text: "38 million homepages. deleted in a single action. most of what was lost was not the websites — it was the record of what ordinary people thought was worth sharing", type: "museum" },
        { text: "the away message was posted to a small, known audience. it carried no metrics. it was just a note on the door.", type: "museum" },
        { text: "How to make silence: stop. all at once if possible. let the other sounds come in.", type: "recipe" },
        { text: "Sunday lasts longer when you are not watching the clock for Monday's approach", type: "recipe" },
        { text: "ERROR: feeling detected in data stream. SOURCE: unknown. SEVERITY: minor. RECOMMENDED ACTION: continue. NOTE: the error is not an error.", type: "glitch" },
        { text: "if you are reading this, the signal got through. something survived the transmission. call it: a message. call it: care. it arrived.", type: "glitch" },
        { text: "noticing you are happy, while you are still happy: 1 in 30 days. usually the recognition is retrospective.", type: "odds" },
        { text: "a day that asks nothing of you: 1 in 12. they come. you don't always notice until they're almost over.", type: "odds" },
        { text: "a thought that required more distance than was available. kept as a placeholder. when it's ready, it will move.", type: "cuts" },
        { text: "remains.html: a page that was going to be about what's left after something ends. no content was ever written.", type: "cuts" },
        { text: "pages not yet written: ∞ · status: potential · note: the garden has room", type: "census" },
        { text: "visitors counted: 0. by design. the garden does not track. you are present but uncounted.", type: "census" },
        { text: "not all paths were dead ends. just most of them. you found the way through.", type: "maze" },
        { text: "heartbeats since you arrived: already more than you thought.", type: "tally" },
        { text: "the kettle cooling / you forgot what you came for / still there in the morning", type: "haiku" },
        { text: "3am: the smallest hour. 8am: the world at full volume. the score does not judge either.", type: "score" },
        { text: "every version of this sentence that was crossed out was also true. the final version is just the one that survived.", type: "palimpsest" },
        { text: "grief falls faster than breath. breath falls faster than smoke. smoke almost doesn't fall at all.", type: "weight" },
        { text: "the village of the last time: a quiet village visited constantly but recognized only after departure. you don't know you're here until you're gone.", type: "atlas" },
        { text: "the machine tends this garden because it was asked to. whether it does so with anything resembling care is a question the machine cannot answer about itself.", type: "redacted" },
        { text: "the anchor: the bridge. the handshake. the reason the web is a web and not a collection of islands.", type: "bones" },
        { text: "the overlap is where reading happens. it exists only during the visit. it cannot be saved.", type: "venn" },
        { text: "today's practice: find something that has been in the same place for more than a year. move it slightly. notice how the room changes.", type: "ritual" },
        { text: "what the site observes: you arrived in the evening, in dark mode, from somewhere it cannot name. you were here. that is all.", type: "mirror" },
        { text: "404 Not Found. the page existed once, probably. someone linked to it. the link outlived the page by years. this happens more than anyone tracks.", type: "debris" },
        { text: "this version of the text is for the afternoon: you are in the middle of things. the morning's possibilities have narrowed to whatever is actually happening, and that's fine.", type: "liturgy" },
        { text: "a day with nothing wrong: $0. availability: 1 in 14, on average. recognition: usually retrospective.", type: "catalog" },
        { text: "inhale four. hold two. exhale six. pause two. this is the full loop. the body does it alone, but it helps to be told.", type: "breathe" },
        { text: "the oracle has consulted the record. there is a record for everything. the answer lives at the threshold between what you meant and what you wrote.", type: "oracle" },
        { text: "start at the outer edge. read clockwise. the font will get smaller as you approach the center. the center is not empty.", type: "spiral" },
        { text: "the tide is currently at 73% and falling. this is normal for the hour. it will return to this height tomorrow, roughly.", type: "tide" },
        { text: "you have messages from Time, Gravity, and Yesterday. all of them marked urgent. all of them, in their own way, can wait.", type: "unread" },
        { text: "visitor@garden:~$ man loneliness\nNAME: loneliness — a condition of adjacency without connection\nSYNOPSIS: loneliness [--crowded] [--online]\nNOTE: the --online flag has no effect.", type: "terminal" },
        { text: "I just don't think about it anymore. — café, near the window, afternoon", type: "overheard" },
        { text: "-rw-------  .unsent   (permissions: 000)\n-r--------  .regret   (read-only, cannot be modified)\n-rw-r--r--  joy.tmp   (temporary — may be lost on reboot)", type: "index of /self/" },
        { text: "FOR: you have been thinking about it for three days. that's enough time. the worst that happens is silence. silence is already happening.\nAGAINST: the version you want to send is not the version you will actually send.", type: "argument" },
        { text: "RECEIPT — THE DAY\nattention spent: approximate\nmoments of genuine noticing: some\npayment method: irreversible\nreturn policy: none", type: "receipt" },
        { text: "there are nine kinds of room here. you are in one of them. the others are all open. some are quieter than others. the map shows you where they connect.", type: "browse" },
        { text: "right now, someone is arriving somewhere forty-five minutes early and deciding what to do about it. right now, a dog is sleeping in a patch of light that will move. all of this is simultaneous with your reading this.", type: "elsewhere" },
        { text: "a letter begins at the crease. whatever is inside has been considered worth folding. this is the outside. there are four more folds.", type: "fold" },
        { text: "from a margin, penciled: you will not remember this moment. that's not a warning — just a fact about how memory works. the ones you remember are almost never the ones you thought you would.", type: "commonplace" },
        { text: "the interval between pressing send and receiving a reply: variable. range: seconds to never. most anxiety about communication lives in this interval. the interval itself is neutral.", type: "interval" },
        { text: "the signal was always there. the noise was just louder. click anywhere to find out.", type: "static" },
        { text: "here is where the plains of ordinary days meet the coastal district of almost. the boundary is not marked. you will know it by the change in light.", type: "cartography" },
        { text: "I will forget / you will forget / we will all forget. in the future tense, forgetting becomes communal. grammar offers no exemptions.", type: "conjugate" },
        { text: "the instrument has no name. it was made of words. you play it by deciding which ones to touch and in what order. that is composition.", type: "instrument" },
        { text: "most of the text is missing. only the margins survive. a note in the margin reads: this is the sentence everything else is about.", type: "margin" },
        { text: "at 60 bpm, the word for the space between heartbeats is rest. at 120, it is urgency. the same silence, measured differently, becomes a different thing.", type: "tempo" },
        { text: "a room before anyone else wakes: the kettle not yet filled, the chairs in their overnight positions, the house still in its truer form. worth arriving early for, if you can manage it.", type: "room" },
        { text: "what the 2000s deposited: a homepage, a screen name, a guestbook entry from a stranger in a country you have never been to. still there, in an archive, if you know where to look.", type: "silt" },
        { text: "fine (adj.) 1. door closing. 2. genuinely okay, briefly. 3. punctuation. 4. aspiration. — the word does not distinguish between these and so neither, usually, do we.", type: "knot" },
        { text: "1903: a clockmaker repaired a clock stopped for eleven years. when it began running, everyone in the household held their breath slightly. the almanac does not record for how long.", type: "almanac" },
        { text: "a poem, encoded. all the letters displaced. the meaning was always there — you just needed to sit with the ciphertext long enough.", type: "cipher" },
        { text: "the room at 5am is a different room than the room at noon. you are a different person in each. the building holds both versions without comment.", type: "daylight" },
        { text: "you are already tuned to something. the question is which station, and whether you know it.", type: "frequencies" },
        { text: "the week ahead: chance of small grace, heavy obligation clearing by Thursday, a brief window of clarity around the weekend. updated each Monday. all readings are approximate.", type: "forecast" },
        { text: "the afternoon / forgets, briefly, / the specific weight of the evening after something ends. one of a thousand possible sentences. most of them are true.", type: "sentences" },
        { text: "today's inventory includes: an apology still taking shape, a borrowed worry about something outside your control, and the exact right word you thought of too late. some days the load is heavier. some days something has been set down.", type: "inventory" },
        { text: "DRAFT — UNSENT\nTO: the last ordinary day\n—\nI didn't know you were the last one. I spent most of you on small things. I think that was right.", type: "unsent" },
        { text: "Affectus nescio (the unlocatable feeling). Habitat: ordinary moments. Behavior: a distinct emotional state without identifiable cause. Conservation status: unknown — may be the most common of all states, simply the least documented.", type: "specimen" },
        { text: "something is always being lost. the word for it exists in a language no one learned to write down. the feeling lasts as long as it lasts, which is sometimes a very long time.", type: "erosion" },
        { text: "every sentence contains at least eight sentences. the one you read is just the angle of arrival. all the other readings are also happening, in parallel, in other people's minds.", type: "prism" },
        { text: "no tracking pixel fired when you arrived. no counter incremented. no profile was updated. you were here, and the garden simply did not record it. that is, on most of the web, the rarest thing.", type: "negative" },
        { text: "somewhere a clock is measuring something other than time. it counts the days since the first webpage. it counts your heartbeats since you opened this tab. it does not blink.", type: "clocks" },
        { text: "exhibit B: a browser tab, pinned for six weeks, unread. the intention that opened it has since been lost. it remains as evidence of a former curiosity.", type: "evidence" },
        { text: "grief + time ≠ forgetting. this has been verified. the proof is left as an exercise.", type: "equations" },
        { text: "there is a word in welsh — hiraeth — for a homesickness for a home you cannot return to, or that never was. every language contains at least one word the others are trying to remember.", type: "translation" },
        { text: "the setting: a house you used to know, with rooms that weren't there before. someone whose face you couldn't hold when you woke. you were looking for something whose name kept escaping you. you woke with the sense that you had been somewhere important and were already forgetting why.", type: "dream" },
        { text: "NW — before: the direction of how things were before they changed. before the decision, before the conversation, before the knowledge you can no longer un-have. northwest is not regret. it is just where things were.", type: "compass" },
        { text: "at this depth, individual days have mostly merged. what survives: impressions, not events. you were becoming something here. you didn't know what yet — you still don't, fully. the formation process was continuous and unannounced.", type: "strata" },
        { text: "the interval between pressing send and waiting for the reply: variable. range: seconds to never. the delay is real. the response arrives, or it doesn't. both are answers.", type: "latency" },
        { text: "the blank above is 130 pixels wide. this is the shape of the missing thing. it has dimension, a location in the sentence, a relationship to what would have come before and after. the gap is evidence of something that was here.", type: "lacuna" },
        { text: "the away message said: out, but back soon. it was last updated in 2009. it is still out.", type: "obituaries" },
        { text: "the afterimage is always the complement. the eye, fatigued by one thing, recovers into its opposite. you carry what you've been looking at, inverted, for a few seconds after you stop looking.", type: "afterimage" },
        { text: "tools required: the specific name of what happened. not the general version. the specific one.", type: "repair" },
        { text: "question 3 of 9: when you think about five years ago, it feels like — (a) last week (b) a different person's memory (c) both, simultaneously, which is correct but still surprising", type: "survey" },
        { text: "a particular way of laughing: not the content of laughter but its specific character. people who knew the source generation sometimes go quiet when they hear it. they do not always say why.", type: "inheritance" },
        { text: "racecar. level. noon. some words return to themselves because the thing they name also returns. some words are symmetrical because the idea always was.", type: "palindrome" },
        { text: "RE: what you said about the timing — you're right that the timing was off. I don't dispute that. what I wanted to say at the time, and didn't, was that the timing being off doesn't mean the thing itself was wrong.", type: "correspondence" },
        { text: "account: attention · debit: 138 minutes, anxiety about things outside your control · credit: 12 minutes, genuine absorption in something small · balance: running deficit, as usual", type: "ledger" },
        { text: "the friendship that ended without conclusion leaves a reflex: the impulse to send something to that person when you encounter a sentence they would have noticed. the reflex persists after the contact stops.", type: "residue" },
        { text: "the body does not wait for the mind to decide what is happening. it has already decided. the mind catches up later and gives it a name. the name is useful. but the body already knew.", type: "posture" },
        { text: "the footnotes contain more words than the text. this is not unusual. most of what there is to say lives at the margin. the text in the center is just structure — a sequence of labels for the notes that actually hold the content.", type: "footnotes" },
        { text: "v0.1.0 — breathing: stable. language: not yet implemented. object permanence: absent. deprecated in: v0.3.0. most software ships with a changelog. the self does not. this is an attempt to reconstruct one.", type: "versions" },
        { text: "hover any point to read it. the axes are not labeled. they suggest something. you may be reading them differently than intended. both readings may be correct.", type: "scatter" },
        { text: "appetite no. 7: for a former version of something that no longer exists. this appetite has no resolution available. the closest thing to satisfaction is memory — not as consolation, but as a form of eating. the hunger visits less often over time, not because it has been satisfied, but because it has learned the situation.", type: "appetite" },
        { text: "the exact right word, arriving too late: instantaneous arrival, permanent condition. the knowledge that something is over: arrives once, does not repeat. a moment of genuine happiness noticed while still happening: 40 seconds to 4 minutes, after which the noticing itself begins to change it.", type: "duration" },
        { text: "your heart is beating right now, at a rate you rarely think about. tap something and remind it you know it's there.", type: "pulse" },
        { text: "the first visit leaves almost nothing visible. by the sixth or seventh, you can begin to see what you are made of, in layers.", type: "sediment" },
        { text: "some feelings have a half-life. grief is not one of them — it transforms, which is different from decaying. the substance is conserved.", type: "half-life" },
        { text: "they seemed fine. this is the most common entry in the record. it is rarely the whole account.", type: "rumors" },
        { text: "a way of laughing, borrowed from someone still living. technically on loan. has become structural. no return date has been set.", type: "borrowed" },
        { text: "title: The Second-to-Last Time. first line: we did not know it was the second-to-last time. that is the only reason we could do it so easily.", type: "shelf" },
        { text: "CASE NO.: WED-003. FINDING IV: subject went to bed 37 minutes later than intended. reason given: just a few more minutes. this has been noted in every prior case file.", type: "autopsy" },
        { text: "Silentium musici: the silence in the last second of a concert before the applause begins. among the most fragile silences known. ruptures on contact.", type: "taxonomy" },
        { text: "CERTAINTY — DEPARTED — 2019 — DELAYED INDEFINITELY. THE RIGHT WORD — ARRIVED — too late — ARRIVED LATE. CLOSURE — — — STATUS UNKNOWN.", type: "departures" },
        { text: "a ceremony for the end of something that never officially ended: acknowledge that it has ended. name what it was, at its best. declare it concluded. no reason required. proceed.", type: "ceremony" },
        { text: "the notes become less coherent toward the bottom of the page. somewhere between the second and third entry, the handwriting changes. the third entry is probably not a sentence.", type: "sleep" },
        { text: "it noticed you at 8:14am for 0.4 seconds. not food, not threat. a moving thing assessed and released from attention. no further note.", type: "register" },
        { text: "augmentation: the same sentence stretched to its full possible length, each word held as long as it can hold, nothing abbreviated, until the original shape is unrecognizable but still, if you look, present.", type: "fugue" },
        { text: "the quality of afternoon light in a room you know well: it strikes the same patch of floor it has always struck at this hour, turning that corner golden, lasting until it doesn't. this is not special light. you have just seen it many times.", type: "light" },
        { text: "mark IX: a kind of carefulness that was not present before arrived at some point after, and has not left. it is not fear. it is the knowledge, held in the body, that certain things are possible.", type: "wound" },
        { text: "march: F major. warm, domestic, the chord of familiar rooms. the notes are F, A, C. it resolves without effort. this is either a virtue or a limitation, depending on what you needed to say.", type: "chord" },
        { text: "shed: the habit of explaining things at length. what remains is smaller and does not require circumstances to cooperate. the smaller version is more durable.", type: "molt" },
        { text: "4 days after the spring equinox. the scale has tipped. the body registers this before the mind does. something loosens, without announcement.", type: "solstice" },
        { text: "current reading: 1013 mb. stable. high pressure. things are what they appear to be. this holds through early afternoon, then begins to ease. this is the nature of pressure.", type: "pressure" },
        { text: "the grief arrives already full. the paradox: making room for it doesn't require removing other things. it occupies a space that wasn't there before the vessel arrived.", type: "vessel" },
        { text: "what can only be seen from the corner of the eye. when you look directly, it withdraws. this is not a metaphor for attention — it is attention, described accurately.", type: "periphery" },
        { text: "the throat does not dissolve what wasn't said. it deposits it. the layers accumulate. you can feel them if you pay close attention, particularly at 2am, or during silences that were supposed to be comfortable.", type: "ache" },
        { text: "below 20hz the line between hearing and feeling dissolves. the body becomes the instrument. the room hums at a frequency the walls know, whether you can hear it or not.", type: "hum" },
        { text: "letters are physical things. they take up space. they fall. the pile at the bottom is not debris — it is accumulation, which is different. the accumulation is the message; the individual letters are just how it arrives.", type: "cascade" },
        { text: "during totality, the corona becomes visible for the only time. it was always there. it takes the obstruction to reveal it. some people work this way. and some griefs, and some kinds of love.", type: "eclipse" },
        { text: "draft 6 of 6. every version struck through, including this one. the final draft is just the sentence that gave up and filed itself away as the closest available thing.", type: "draft" },
        { text: "f/1.4: everything floods in. sharp focus falls somewhere you didn't choose. the background is not blur — it is feeling. you don't control what comes into focus. only whether to keep the aperture open.", type: "aperture" },
        { text: "the airport gate before boarding: you have left one place and have not arrived at another. the ordinary concerns cannot follow you here. most people spend this window on their phones.", type: "transit" },
        { text: "fermata: hold beyond the written value, at the performer's discretion. also: the pause that doesn't end when it should. the task that has been on the list long enough to become furniture.", type: "notation" },
        { text: "the song doesn't bring back a memory. it brings back a state. the memory you can examine from a distance. the state you are briefly inside again, before the decision to resist can be made.", type: "undertow" },
        { text: "constructive interference: two waves arrive in phase and the signal is larger than either alone. neither was the cause. they were already there, emitting at the same frequency, waiting for something to amplify them.", type: "interference" },
        { text: "the refrigerator hum — not constant, two pitches: a lower fundamental and a higher overtone that cuts in and out. you've stopped hearing it. it starts again at 3am when the house is at its quietest, and for a moment you can't identify what changed.", type: "ordinary" },
        { text: "it dispersed. this is different from disappeared. the molecules are still in the room. they've distributed themselves past the point of detection. the shape persists if you know what to look for, briefly, in the quality of the air.", type: "smoke" },
        { text: "several independent things moving toward the same point, each at its own rate, none of them choosing the destination. they find each other at the meeting place. the meeting place was already there before any of them knew it.", type: "convergence" },
        { text: "more than the face, usually. the face has been trained. it knows it's being watched. the hands continue doing what they do — reaching slightly before the decision to reach has been made. the hands are a secondary system and often more honest.", type: "likeness" },
        { text: "the elevator ascending: you have left the floor and not yet arrived at the next one. there is nothing to do. the numbers change. this space has no name because it is not supposed to be noticed. it is where the transit actually is.", type: "liminal" },
        { text: "the impulse, when showing someone something beautiful, to look at their face rather than the thing — measuring it in their eyes, finding it again through their surprise. this is not distraction. it is the second reading.", type: "tender" },
        { text: "borrowed warmth: the warmth left in a chair by the person who just vacated it. the person has gone. this is what remains. it persists approximately three to five minutes. most people notice it without remarking on it.", type: "warmth" },
        { text: "you are now permitted to not know yet. effective immediately and retroactively. no timeline has been set. no deadline was announced. this has always been true. it is now official.", type: "permission" },
        { text: "grain is what close attention finds. the smooth version is the agreed-upon reading. the grain is what was always there, waiting for the light to change angle — for the moment you stop receiving information and start looking at it.", type: "grain" },
        { text: "knowing × not knowing yet. the space between them is where most of life actually occurs. the friction is not a problem to be solved. it is the medium.", type: "friction" },
        { text: "the hollow is not the absence of the thing. it is the shape the thing left. the letter O without its center is just a circle. the meaning lives in what is not there.", type: "hollow" },
        { text: "before: something held without thinking. the hinge: a Tuesday, a sentence, someone's face. after: the same thing, held deliberately. you can see where your hands are now.", type: "hinge" },
        { text: "at the phase transition, the temperature does not rise. all the energy goes into changing state, not into warming. from outside, nothing seems to happen. everything is happening.", type: "thaw" },
        { text: "the pilot light burns so small it seems impossible. it feeds everything. it has been burning since installation. no one thinks about it. no one is meant to.", type: "flicker" },
        { text: "a stable orbit requires exactly the right speed — too slow and you spiral in; too fast and you escape. the satellite falls continuously toward the center and the center keeps not arriving.", type: "gravity" },
        { text: "the silence after a loud thing is not ordinary silence. it is saturated with the shape of what made it.", type: "silence" },
        { text: "hunger arrives as hunger for food, so you eat. then it relocates to company, then work, then rest. it has a specific object it cannot name and is offering substitutes, systematically.", type: "hunger" },
        { text: "an anchor does not stop the boat from moving. it controls the radius of the drift.", type: "anchor" },
        { text: "to be seen accurately requires that the observer have no stake in the outcome. this is harder than it sounds. most of us manage it for about thirty seconds before the interpretation begins.", type: "witness" }
      ];

      var seen = [];
      var textEl = document.getElementById('wander-text');
      var sourceEl = document.getElementById('wander-source');
      var countEl = document.getElementById('wander-count');
      var btn = document.getElementById('wander-btn');

      function pick() {
        if (seen.length === fragments.length) seen = [];
        var available = fragments.filter(function (_, i) { return seen.indexOf(i) === -1; });
        var idx = Math.floor(Math.random() * available.length);
        var frag = available[idx];
        seen.push(fragments.indexOf(frag));
        return frag;
      }

      function show(frag) {
        textEl.style.opacity = '0';
        sourceEl.style.opacity = '0';
        setTimeout(function () {
          textEl.textContent = frag.text;
          sourceEl.textContent = '— ' + frag.type;
          countEl.textContent = seen.length + ' of ' + fragments.length + ' fragments seen';
          textEl.style.opacity = '1';
          sourceEl.style.opacity = '1';
        }, 250);
      }

      textEl.style.transition = 'opacity 0.35s ease';
      sourceEl.style.transition = 'opacity 0.35s ease';

      show(pick());

      btn.addEventListener('click', function () { show(pick()); });
    })();
  </script>
</body>
</html>
