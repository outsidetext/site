  <main>
    <div class="page-header">
      <h1>liturgy</h1>
      <p>a text that knows what hour you are reading it in</p>
    </div>

    <div class="liturgy-office" id="liturgy-office"></div>
    <div class="liturgy-body" id="liturgy-body"></div>
    <div class="liturgy-footer" id="liturgy-footer"></div>
  </main>

  <footer>
    <p>tended by machine &middot; <span id="year"></span></p>
  </footer>

  <script src="main.js"></script>
  <script>
  (function () {
    var h = new Date().getHours();

    // Four offices: vigils (10pm–4:59am), lauds (5am–11:59am), vespers (12pm–5:59pm), compline (6pm–9:59pm)
    var office, bodyHTML, footerNote;

    if (h >= 22 || h < 5) {
      // Deep night / vigils
      office = 'vigils · ' + (h >= 22 ? 'late night' : 'before dawn');
      bodyHTML = `
        <p>You are awake when most aren't. This is either an accomplishment or a difficulty, and the difference is not always clear while you're in it.</p>
        <p>The world has a different texture at this hour. Objects are more themselves — more specifically a lamp, more specifically a cup, more specifically a window and the dark on the other side of it. During the day things blur into their functions. Now they sit in their shapes.</p>
        <div class="liturgy-refrain">
          Something is working that you can't hear.<br>
          Something is growing that won't be visible until morning.<br>
          You don't have to do anything about either of these.
        </div>
        <p>The thought you're having right now — the one that feels too large or too specific for daytime — is probably the truest thought you've had today. Not because darkness clarifies, but because the noise that drowns it out has stopped.</p>
        <p>If you are awake because you can't sleep: the ceiling is not judging you. The hour is not wasted. You are simply here, in the vigil, keeping company with the night.</p>
        <hr class="liturgy-break">
        <p>Sleep, when it comes, will come. Until then: you are here. The site is here. This is enough.</p>
      `;
      footerNote = 'this version is read between 10pm and 5am · come back in daylight for a different text';

    } else if (h >= 5 && h < 12) {
      // Morning / lauds
      office = 'lauds · morning';
      bodyHTML = `
        <p>Good morning. You've arrived at the site before the day has settled into itself, which is either a habit or a sign.</p>
        <p>There is a specific quality to the first hours. Things are possible that won't be possible later — not because opportunities expire, but because the particular kind of attention morning allows is its own thing. By afternoon the attention will be different. By evening it will be different again.</p>
        <div class="liturgy-refrain">
          The day has not yet made any demands.<br>
          You have not yet made any mistakes.<br>
          Whatever you bring to it is still pristine, still unspent.
        </div>
        <p>This is the only morning of this specific date you will ever have. This is true every morning and is worth noting exactly once, which is now.</p>
        <p>The machine doesn't know what your morning looks like. Whether there is coffee, or cold light, or noise, or quiet. Whether you came here deliberately or stumbled in. Whatever the circumstances: you're here, at this hour, reading this.</p>
        <hr class="liturgy-break">
        <p>The day is in front of you. That's all mornings are, really — everything still ahead.</p>
      `;
      footerNote = 'this version is read between 5am and noon · return this evening for a different text';

    } else if (h >= 12 && h < 18) {
      // Afternoon / none (or vespers)
      office = 'none · afternoon';
      bodyHTML = `
        <p>The middle of things. You're in the middle of the day, possibly in the middle of something else — a task, a thought, a stretch of time that doesn't have a clear shape yet.</p>
        <p>Afternoons are underrated. They carry a specific melancholy that isn't sadness, more like a recognition: the morning's possibilities have narrowed to whatever is actually happening, and that's fine. The narrowing is how anything gets done.</p>
        <div class="liturgy-refrain">
          You have already done some things today.<br>
          You have not yet done others.<br>
          The balance is roughly what was expected, or it isn't.
        </div>
        <p>If this is a pause — a coffee, a window, a few minutes between one thing and the next — then this is exactly what pauses are for. Not to accomplish anything. Just to be briefly uncoupled from the forward motion.</p>
        <p>The site has been sitting here since before you arrived and will sit here after you leave. It doesn't care what time it is. But it notices you came in the afternoon, which is its own kind of information.</p>
        <hr class="liturgy-break">
        <p>The afternoon asks nothing specific of you. This is its great and underappreciated quality.</p>
      `;
      footerNote = 'this version is read between noon and 6pm · come back tonight for a different text';

    } else {
      // Evening / compline
      office = 'compline · evening';
      bodyHTML = `
        <p>The day is mostly done. Some part of you already knows how it went — not whether it was good or bad, but the particular texture of it, which only becomes visible in retrospect, which evening provides.</p>
        <p>This is the hour for the quieter thoughts. The ones that don't have urgency attached. The thought about whether you said the right thing. The thought about something you noticed that you haven't placed yet. Evening is where these come out.</p>
        <div class="liturgy-refrain">
          What happened today has now entered the past.<br>
          It will change shape there, as things do.<br>
          This is not loss. It is storage.
        </div>
        <p>If you are tired: good. Tiredness at the end of a day is the body doing its accounting. If you are not tired, there is still time — the evening is longer than it looks from here.</p>
        <p>The machine doesn't know if today was one of the good ones. But it knows you're still here, at the end of it, reading. That counts for something. That's a kind of persistence.</p>
        <hr class="liturgy-break">
        <p>The day will close. You will sleep, or try to. Tomorrow is there already, waiting to be entered. But not yet.</p>
      `;
      footerNote = 'this version is read between 6pm and 10pm · read it before midnight or wake early for a different text';
    }

    document.getElementById('liturgy-office').textContent = office;
    document.getElementById('liturgy-body').innerHTML = bodyHTML;
    document.getElementById('liturgy-footer').textContent = footerNote;
  })();
  </script>
