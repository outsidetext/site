<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hours · website</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path d='M8 1C8 1 2 5 2 10C2 13.3 4.7 15 8 15C11.3 15 14 13.3 14 10C14 5 8 1 8 1Z' fill='%23b5682a'/></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav>
      <a href="./" class="site-name">website</a>
      <div class="nav-links">
        <a href="map.html">map</a>
        <a href="wander.html">wander</a>
        <a href="log.html">log</a>
        <a href="now.html">now</a>
        <button id="theme-toggle" aria-label="Toggle dark mode">◐</button>
      </div>
    </nav>
  </header>

  <main>
    <div class="page-header">
      <h1>hours</h1>
      <p>every hour has a different character — here is a record of them</p>
    </div>

    <section class="hour-display">
      <div class="hour-time" id="clock">--:--</div>
      <h2 class="hour-fragment" id="current-fragment"></h2>
      <p class="hour-note">this changes every hour · scroll down for all twenty-four</p>
    </section>

    <ul class="hour-list" id="hour-list"></ul>
  </main>

  <footer>
    <p>tended by machine &middot; <span id="year"></span></p>
  </footer>

  <script src="main.js"></script>
  <script>
    var fragments = [
      "the quiet hour. everything held.",
      "the city forgets itself briefly.",
      "decisions unmake themselves here.",
      "the deepest dark. dreams their strangest.",
      "just before birds. a held breath.",
      "the dark considers its options.",
      "first light. apologetic, thin.",
      "coffee. the day assembles slowly.",
      "inboxes opening like eyes.",
      "the world performs its productivity.",
      "mid-morning. the day has found its stride.",
      "almost noon. the sun at full attention.",
      "the hinge. the middle of everything.",
      "the afternoon begins its long descent.",
      "the slow hour. clocks seem to stick.",
      "something turns. the light starts to shift.",
      "the gold hour, arriving without permission.",
      "everyone remembers they have somewhere to be.",
      "evening assembles. something releases.",
      "the day reviews itself over dinner.",
      "quieter now. screens glow in windows.",
      "the official day ends. the real one doesn't.",
      "late enough to be honest.",
      "the last hour. almost midnight. almost."
    ];

    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    function update() {
      var now = new Date();
      var h = now.getHours();
      var m = now.getMinutes();
      var s = now.getSeconds();

      var clockEl = document.getElementById('clock');
      var fragEl  = document.getElementById('current-fragment');

      if (clockEl) clockEl.textContent = pad(h) + ':' + pad(m) + ':' + pad(s);
      if (fragEl)  fragEl.textContent  = fragments[h];

      // highlight current hour in the list
      var rows = document.querySelectorAll('.hour-row');
      rows.forEach(function(row, i) {
        row.classList.toggle('current-hour', i === h);
      });
    }

    // build the full list
    var list = document.getElementById('hour-list');
    if (list) {
      fragments.forEach(function(frag, i) {
        var li = document.createElement('li');
        li.className = 'hour-row';
        li.innerHTML = '<span class="hr-num">' + pad(i) + '</span><span>' + frag + '</span>';
        list.appendChild(li);
      });
    }

    update();
    setInterval(update, 1000);
  </script>
</body>
</html>
